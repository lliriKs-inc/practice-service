name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "docs/api/**"
      - "docs/api-contract.md"
      - "docs/e2e-api-checklist.md"
      - "README.md"
      - ".github/workflows/backend-ci.yml"

  push:
    branches:
      - main
      - integration/new-architecture
    paths:
      - "backend/**"
      - "docs/api/**"
      - "docs/api-contract.md"
      - "docs/e2e-api-checklist.md"
      - "README.md"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  backend:
    name: Typecheck, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: practice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d practice_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: 3000

      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/practice_test?schema=public

      JWT_SECRET: ci-jwt-secret-that-is-longer-than-32-characters
      JWT_ISSUER: practice-service
      JWT_AUDIENCE: practice-service-api

      CORS_ORIGIN: http://localhost:3001
      JSON_BODY_LIMIT: 1mb
      UPLOAD_DIR: uploads
      RUN_DB_INTEGRATION: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
