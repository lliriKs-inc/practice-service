name: practice-development

services:
  postgres:
    image: postgres:16-alpine
    container_name: practice_db
    environment:
      POSTGRES_USER: practice_user
      POSTGRES_PASSWORD: practice_secure_password
      POSTGRES_DB: practice_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_user -d practice_main"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: practice_backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://practice_user:practice_secure_password@postgres:5432/practice_main?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_ISSUER: practice-service
      JWT_AUDIENCE: practice-service-api
      CORS_ORIGIN: http://localhost:3002
      AUTH_RATE_LIMIT_MAX_REQUESTS: 1000
      RATE_LIMIT_MAX_REQUESTS: 5000
      MAIL_ENABLED: "false"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: practice_frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
