version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: practice_db
    environment:
      POSTGRES_USER: practice_user
      POSTGRES_PASSWORD: practice_secure_password
      POSTGRES_DB: practice_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_user -d practice_main"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: practice_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://practice_user:practice_secure_password@postgres:5432/practice_main
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: