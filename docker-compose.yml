version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: practice_db
    environment:
      POSTGRES_USER: practice_user
      POSTGRES_PASSWORD: practice_secure_password
      POSTGRES_DB: practice_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: