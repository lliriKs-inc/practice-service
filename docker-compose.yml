version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: practice_db
    environment:
      POSTGRES_USER: practice_user
      POSTGRES_PASSWORD: practice_secure_password
      POSTGRES_DB: practice_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practice_user -d practice_main"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: practice_backend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://practice_user:practice_secure_password@postgres:5432/practice_main
      - JWT_SECRET=${JWT_SECRET}
      # Локальный frontend dev-сервер (npm run dev) поднимается на 3002, если
      # 3000/3001 заняты — без этого браузерные fetch-запросы (register/login)
      # блокируются CORS (curl/node fetch этого не показывают, т.к. не следуют CORS).
      - CORS_ORIGIN=http://localhost:3002
      # /auth/* (включая /auth/me, который useAuth() дёргает при каждом
      # заходе на защищённую страницу) rate-limited по умолчанию 10 req/15мин —
      # для локальной разработки/E2E этого мало, поднимаем без изменения кода.
      # См. BACKEND_GAP_COHORT_API.md: стоит ли /auth/me лимитировать так же
      # жёстко, как login/register — вопрос к backend-команде.
      - AUTH_RATE_LIMIT_MAX_REQUESTS=1000
      # Глобальный rate limiter (все роуты, включая admin cohort/track/survey/
      # invitation API) — E2E-сидинг когорты делает ~9 admin-запросов на тест,
      # что быстро упирается в дефолтный лимит при полном прогоне (chromium+mobile).
      - RATE_LIMIT_MAX_REQUESTS=5000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: practice_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
volumes:
  postgres_data:
