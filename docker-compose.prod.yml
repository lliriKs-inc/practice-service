name: practice-production

x-backend-environment: &backend-environment
  NODE_ENV: production
  PORT: 3000
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the production env file}
  JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the production env file}
  JWT_ISSUER: ${JWT_ISSUER:-practice-service}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-practice-service-api}
  CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN in the production env file}
  JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-1mb}
  TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
  RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
  RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-300}
  AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
  AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-10}
  UPLOAD_RATE_LIMIT_WINDOW_MS: ${UPLOAD_RATE_LIMIT_WINDOW_MS:-900000}
  UPLOAD_RATE_LIMIT_MAX_REQUESTS: ${UPLOAD_RATE_LIMIT_MAX_REQUESTS:-30}
  UPLOAD_DIR: /app/uploads
  UPLOAD_MAX_FILE_SIZE_BYTES: ${UPLOAD_MAX_FILE_SIZE_BYTES:-10485760}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  MAIL_ENABLED: ${MAIL_ENABLED:-true}
  SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST in the production env file}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:?Set SMTP_USER in the production env file}
  SMTP_PASS: ${SMTP_PASS:?Set SMTP_PASS in the production env file}
  SMTP_FROM: ${SMTP_FROM:?Set SMTP_FROM in the production env file}

x-service-hardening: &service-hardening
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "10"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in the production env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the production env file}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in the production env file}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "10"

  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migration
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the production env file}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  backend:
    <<: *service-hardening
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    volumes:
      - uploads_data:/app/uploads
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777

  frontend:
    <<: *service-hardening
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in the production env file}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,mode=0755,uid=10001,gid=10001

volumes:
  postgres_data:
  uploads_data:
